# --- Persistence (Goal 2 requirement) ---
persistence:
  enabled: true
  size: 5Gi
  # storageClassName: ""    # Uncomment + set if your cluster needs it

# --- Pre-configure Loki as a datasource ---
datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        url: http://loki.observability.svc.cluster.local:3100
        access: proxy
        isDefault: true
        jsonData:
          maxLines: 1000

# --- Default dashboards ---
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        folder: "Kubernetes"
        type: file
        options:
          path: /var/lib/grafana/dashboards/default

# Load a pre-built Kubernetes log dashboard from Grafana.com
dashboards:
  default:
    kubernetes-logs:
      gnetId: 15141       # "Kubernetes / Logs" community dashboard
      revision: 1
      datasource: Loki

# --- Admin credentials ---
adminUser: admin
adminPassword: "ChangeMe123!"     # Change or use a Secret reference

# --- Resource limits (adjust per your cluster) ---
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# --- Service (ClusterIP default; use NodePort or port-forward to access) ---
service:
  type: ClusterIP